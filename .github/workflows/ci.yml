name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    # A dummy DATABASE_URL satisfies env validation at build time. No real
    # database connection is made during lint/typecheck/unit/build.
    env:
      DATABASE_URL: postgres://volenti:volenti@localhost:5432/volenti
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci_dummy_secret_at_least_32_chars_long_000
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    # Postgres service for the auth/tenant flow. Migrations run as the owner
    # role; the app under test connects as a NOSUPERUSER NOBYPASSRLS role so RLS
    # is actually enforced (matches production setup).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: volenti
          POSTGRES_PASSWORD: volenti
          POSTGRES_DB: volenti
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U volenti -d volenti"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Owner connection — used for migrations, RLS policies and role setup.
      DATABASE_URL: postgres://volenti:volenti@localhost:5432/volenti
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: ci_dummy_secret_at_least_32_chars_long_000
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @volenti/web exec playwright install --with-deps chromium

      - name: Apply migrations (owner role)
        run: pnpm db:migrate

      - name: Apply RLS policies (owner role)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f apps/web/src/lib/db/rls-policies.sql

      - name: Create dedicated app role (NOSUPERUSER NOBYPASSRLS)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DROP ROLE IF EXISTS volenti_app;
          CREATE ROLE volenti_app LOGIN PASSWORD 'volenti_app_ci' NOSUPERUSER NOBYPASSRLS;
          GRANT USAGE ON SCHEMA public TO volenti_app;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO volenti_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO volenti_app;
          SQL

      - name: Build
        run: pnpm build

      - name: Run E2E tests
        # The app under test connects as the restricted app role so RLS applies.
        env:
          DATABASE_URL: postgres://volenti_app:volenti_app_ci@localhost:5432/volenti
        run: pnpm test:e2e
